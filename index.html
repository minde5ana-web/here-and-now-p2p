<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Here & Now P2P</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #22c55e;
}

button {
  padding: 10px;
  border: none;
  background: #22c55e;
  color: black;
  cursor: pointer;
  border-radius: 6px;
}

/* MAIN */
.container {
  padding: 20px;
}

.card {
  background: #020617;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* FORMS */
input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <div class="logo">Here & Now (H&S)</div>
  <div id="userPanel"></div>
</header>

<div class="container">

<!-- AUTH -->
<div id="auth">

<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Register</h2>
<input id="regUser" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">

<select id="role">
  <option value="buyer">Buyer</option>
  <option value="seller">Seller</option>
</select>

<button onclick="register()">Register</button>

</div>

<!-- MAIN -->
<div id="app" class="hidden">

<h2>Requests</h2>

<div id="buyerActions" class="hidden">
<button onclick="openRequest()">+ Add Request</button>
</div>

<div id="requests"></div>

</div>

</div>

<script>

// STORAGE
let users = JSON.parse(localStorage.getItem("users")) || [];
let requests = JSON.parse(localStorage.getItem("requests")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

// INIT
if(currentUser) showApp();

// REGISTER
function register(){
  let user = {
    username: regUser.value,
    email: regEmail.value,
    pass: regPass.value,
    role: role.value,
    rating: 5
  };

  users.push(user);
  localStorage.setItem("users", JSON.stringify(users));
  alert("Registered!");
}

// LOGIN
function login(){
  users = JSON.parse(localStorage.getItem("users")) || [];
  let user = users.find(u => 
    u.email === loginEmail.value && u.pass === loginPass.value
  );

  if(!user) return alert("Wrong login");

  localStorage.setItem("currentUser", JSON.stringify(user));
  showApp();
}

// SHOW APP
function showApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  currentUser = JSON.parse(localStorage.getItem("currentUser"));

  userPanel.innerHTML = `
    ${currentUser.username} (${currentUser.role})
    <button onclick="logout()">Logout</button>
  `;

  if(currentUser.role === "buyer"){
    buyerActions.classList.remove("hidden");
  }

  renderRequests();
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// CREATE REQUEST
function openRequest(){
  let product = prompt("Product / Service");
  let qty = prompt("Quantity");
  let comment = prompt("Comment");

  let req = {
    id: Date.now(),
    user: currentUser.username,
    product,
    qty,
    comment,
    offers: []
  };

  requests.push(req);
  localStorage.setItem("requests", JSON.stringify(requests));
  renderRequests();
}

// RENDER REQUESTS
function renderRequests(){
  requestsDiv.innerHTML = "";

  requests.forEach(r => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${r.product}</b> (${r.qty}) <br>
      ${r.comment} <br>
      By: ${r.user} <br><br>
      ${currentUser.role === "seller" ? `<button onclick="makeOffer(${r.id})">Make Offer</button>` : ""}
      <button onclick="viewOffers(${r.id})">Offers (${r.offers.length})</button>
    `;

    requestsDiv.appendChild(div);
  });
}

// MAKE OFFER
function makeOffer(id){
  let price = prompt("Price");
  let comment = prompt("Comment");

  let req = requests.find(r => r.id === id);

  req.offers.push({
    seller: currentUser.username,
    price,
    comment,
    status: "pending"
  });

  localStorage.setItem("requests", JSON.stringify(requests));
  renderRequests();
}

// VIEW OFFERS
function viewOffers(id){
  let req = requests.find(r => r.id === id);

  let text = "";

  req.offers.forEach((o,i)=>{
    text += `${i+1}. ${o.seller} - ${o.price} (${o.status})\n`;
  });

  alert(text);
}

</script>

</body>
</html>
