<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Here & Now</title>

<style>
body {background:#0f172a;color:white;font-family:Arial;margin:0;}
header {display:flex;justify-content:space-between;padding:15px;background:#020617;}
.logo {color:#22c55e;font-weight:bold;}
.container {padding:20px;}
.card {background:#020617;padding:15px;margin:10px 0;border-radius:10px;}
button {background:#22c55e;border:none;padding:8px;margin-top:5px;cursor:pointer;border-radius:6px;}
input, select, textarea {width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none;}
.hidden {display:none;}

.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}
.modal-content {
  background:#020617;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>

</head>

<body>

<header>
<div class="logo">Here & Now</div>
<div id="userPanel"></div>
</header>

<div class="container">

<div id="auth">
<h3>შესვლა</h3>
<input id="loginEmail" placeholder="მეილი">
<input id="loginPass" type="password" placeholder="პაროლი">
<button onclick="login()">შესვლა</button>

<h3>რეგისტრაცია</h3>
<input id="regUser" placeholder="იუზერნეიმი">
<input id="regEmail" placeholder="მეილი">
<input id="regPass" type="password" placeholder="პაროლი">

<select id="role">
<option value="buyer">მყიდველი</option>
<option value="seller">გამყიდველი</option>
</select>

<button onclick="register()">რეგისტრაცია</button>
</div>

<div id="app" class="hidden">
<div id="buyerPanel" class="hidden">
<button onclick="openRequestModal()">+ მოთხოვნა</button>
</div>

<h3>განაცხადები</h3>
<div id="list"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let requests = JSON.parse(localStorage.getItem("requests")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

// INIT
if(currentUser){ showApp(); }
renderRequests();

// REGISTER
function register(){
  users.push({
    username: document.getElementById("regUser").value,
    email: document.getElementById("regEmail").value,
    pass: document.getElementById("regPass").value,
    role: document.getElementById("role").value,
    rating:5
  });
  localStorage.setItem("users", JSON.stringify(users));
  alert("დარეგისტრირდი");
}

// LOGIN
function login(){
  users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u =>
    u.email === document.getElementById("loginEmail").value &&
    u.pass === document.getElementById("loginPass").value
  );

  if(!user) return alert("არასწორი მონაცემები");

  localStorage.setItem("currentUser", JSON.stringify(user));
  showApp();
}

// LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// SHOW APP
function showApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  currentUser = JSON.parse(localStorage.getItem("currentUser"));

  document.getElementById("userPanel").innerHTML =
    currentUser.username + " (" + currentUser.role + ")" +
    `<button onclick="logout()">გასვლა</button>`;

  if(currentUser.role==="buyer"){
    document.getElementById("buyerPanel").classList.remove("hidden");
  }

  renderRequests();
}

// MODAL
function openModal(html){
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modal").classList.remove("hidden");
}
function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

// REQUEST
function openRequestModal(){
  openModal(`
    <h3>ახალი მოთხოვნა</h3>
    <input id="prod" placeholder="პროდუქტი">
    <input id="qty" placeholder="რაოდენობა">
    <textarea id="comm" placeholder="კომენტარი"></textarea>
    <button onclick="createRequest()">დამატება</button>
    <button onclick="closeModal()">გაუქმება</button>
  `);
}

function createRequest(){
  requests.push({
    id: Date.now(),
    user: currentUser.username,
    product: document.getElementById("prod").value,
    qty: document.getElementById("qty").value,
    comment: document.getElementById("comm").value,
    offers:[]
  });

  localStorage.setItem("requests", JSON.stringify(requests));
  closeModal();
  renderRequests();
}

// RENDER
function renderRequests(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  requests.forEach(r=>{
    let div = document.createElement("div");
    div.className = "card";

    let html = `
      <b>${r.product}</b> (${r.qty})<br>
      ${r.comment}<br>
      ავტორი: ${r.user}<br>
      შეთავაზებები: ${r.offers.length}<br>
    `;

    if(currentUser && currentUser.role==="seller"){
      html += `<button onclick="openOfferModal(${r.id})">შეთავაზება</button>`;
    }

    if(currentUser && currentUser.username===r.user){
      html += `<button onclick="viewOffers(${r.id})">ნახვა</button>`;
    }

    div.innerHTML = html;
    list.appendChild(div);
  });
}

// OFFER
function openOfferModal(id){
  openModal(`
    <h3>შეთავაზება</h3>
    <input id="price" placeholder="ფასი">
    <textarea id="comment"></textarea>
    <button onclick="sendOffer(${id})">გაგზავნა</button>
  `);
}

function sendOffer(id){
  let req = requests.find(r=>r.id===id);

  req.offers.push({
    seller: currentUser.username,
    price: document.getElementById("price").value,
    comment: document.getElementById("comment").value,
    status:"pending"
  });

  localStorage.setItem("requests", JSON.stringify(requests));
  closeModal();
  renderRequests();
}

// VIEW
function viewOffers(id){
  let req = requests.find(r=>r.id===id);

  let html = "<h3>შეთავაზებები</h3>";

  req.offers.forEach((o,i)=>{
    html += `
      <div class="card">
        ${o.seller} - ${o.price}<br>
        ${o.comment}<br>
        სტატუსი: ${o.status}<br>
        <button onclick="accept(${id},${i})">დადასტურება</button>
        <button onclick="reject(${id},${i})">უარყოფა</button>
      </div>
    `;
  });

  html += `<button onclick="closeModal()">დახურვა</button>`;
  openModal(html);
}

// ACTIONS
function accept(id,i){
  let req = requests.find(r=>r.id===id);
  req.offers[i].status="accepted";
  localStorage.setItem("requests", JSON.stringify(requests));
  viewOffers(id);
}

function reject(id,i){
  let req = requests.find(r=>r.id===id);
  req.offers[i].status="rejected";
  localStorage.setItem("requests", JSON.stringify(requests));
  viewOffers(id);
}

</script>

</body>
</html>
